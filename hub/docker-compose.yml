# Sibling docker-compose.yml for the BTC-Trader Hub on the Montreal EC2
# box. DEP-02 (Railway -> AWS Montreal) migration — see docs/CI_CD.md
# and .github/workflows/deploy-hub.yml.
#
# This file lives inside the hub/ directory because:
#   1. It's rsynced to /home/ubuntu/hub/ alongside the source (matching
#      the macro-observer and data-collector pattern on this same box)
#   2. The deploy step's `docker compose up -d --force-recreate` runs
#      from that directory, so compose finds it locally with no -f flag
#   3. It's a sibling to the timesfm-service, macro-observer, and
#      data-collector compose stacks, NOT inside any of them — one
#      stack failure cannot cascade into another
#
# The .env file is templated onto the host by the GitHub Actions deploy
# workflow on every push to develop. It is NOT rsynced — the rsync step
# explicitly excludes .env to avoid wiping the host's secrets.
#
# Build context is `.` (the rsynced hub/ directory). Dockerfile is
# `Dockerfile.aws` — separate from the Railway `Dockerfile` so the
# parallel-deploy window (Railway + AWS both alive) stays additive.
# Once the frontend nginx upstream flips to AWS and Railway's hub
# service is put to sleep, the Railway Dockerfile can be removed in a
# follow-up cleanup PR.
#
# Port: 8091 (hub). This keeps a clear separation from:
#   - 8080  timesfm-service (same box)
#   - 8090  margin-engine status (eu-west-2 but convention-shared)

services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile.aws
    container_name: hub
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      # Allow the hub container to reach host-network services (timesfm on 8080,
      # Postgres on 5432, engine on localhost) via host.docker.internal.
      - "host.docker.internal:host-gateway"
    ports:
      # Bind explicitly to all interfaces so the frontend nginx upstream
      # can reach it across the box's internal network once the cutover
      # lands. The EC2 security group already restricts ingress to the
      # frontend host and the operator's IP.
      - "8091:8091"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # Healthcheck mirrors the Dockerfile HEALTHCHECK but re-declares it
    # here so `docker inspect --format '{{.State.Health.Status}}' hub`
    # works the same way the macro-observer and data-collector ones do
    # (the deploy workflow depends on this).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8091/health', timeout=3).getcode() == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
