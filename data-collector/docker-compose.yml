# Sibling docker-compose.yml for data-collector on the Montreal EC2 box.
#
# This file lives inside data-collector/ because:
#   1. It's rsynced to /home/ubuntu/data-collector/ alongside the source
#   2. The deploy step's `docker compose up -d --force-recreate` runs
#      from that directory, so compose finds it locally
#   3. It's a sibling to the timesfm-service and macro-observer compose
#      stacks, NOT inside any of them — one stack failure cannot cascade
#      into another
#
# The .env file is templated onto the host by the GitHub Actions deploy
# workflow on every push to develop. It is NOT rsynced — the rsync step
# explicitly excludes .env to avoid wiping the host's secrets.
#
# The service is a pure DB writer: polls Polymarket Gamma (public, no
# key) every 1s and writes market_data + market_snapshots rows to the
# shared Railway Postgres. No ports exposed. No external secrets beyond
# DATABASE_URL.
#
# Health check: collector.py touches /tmp/collector.alive at the top of
# every collect cycle. If the file is older than 30s the container is
# unhealthy and restart-policy bounces it. This catches a wedged loop
# faster than macro-observer's 180s window because the collector runs
# at 1 Hz rather than 60 s.

services:
  data-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-collector
    restart: unless-stopped
    env_file:
      - .env
    # No port exposure — pure background writer. Logs go to docker logs.
    # Default bridge network gives outbound egress to Polymarket Gamma
    # and the shared Railway Postgres. Do NOT use network_mode: host.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /tmp/collector.alive 2>/dev/null || echo 0))) -lt 30 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
