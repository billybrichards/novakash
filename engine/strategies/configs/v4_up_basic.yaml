name: v4_up_basic
version: "1.1.0"
mode: GHOST
asset: BTC
timescale: 5m

gates:
  - type: timing
    params: { min_offset: 60, max_offset: 180 }
  - type: direction
    params: { direction: UP }
  - type: confidence
    params: { min_dist: 0.15 }  # 2026-04-14: raised from 0.10 — MODERATE (0.12-0.15) is 26.3% WR, STRONG (≥0.15) = 66.6%
  - type: trade_advised
    params: {}

sizing:
  type: fixed_kelly
  fraction: 0.025
  max_collateral_pct: 0.05
