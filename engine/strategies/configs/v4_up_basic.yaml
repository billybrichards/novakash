name: v4_up_basic
version: "1.0.0"
mode: LIVE
asset: BTC
timescale: 5m

gates:
  - type: timing
    params: { min_offset: 60, max_offset: 180 }
  - type: direction
    params: { direction: UP }
  - type: confidence
    params: { min_dist: 0.10 }
  - type: trade_advised
    params: {}

sizing:
  type: fixed_kelly
  fraction: 0.025
  max_collateral_pct: 0.05
