name: v5_ensemble
version: "5.1.0"
# 2026-04-18: Flipped GHOST → LIVE per Billy. Path 1 classifier is
# deployed on Montreal-timesfm (16.52.14.182) with
# V5_ENSEMBLE_PATH1_ENABLED=true; v5 now consumes the blended p_up via
# surface.poly_confidence and runs alongside v4_fusion (also LIVE).
# The 13 inherited gates + 2 ensemble gates govern execution. Roll
# back to GHOST by editing this file (mode: GHOST) and restarting
# the engine — no code change needed.
# 2026-04-19: Flipped LIVE → GHOST then back to LIVE same day with added
# block_utc_hours: [7,8,9] — those UTC hours were 0-25% WR buckets.
# v5_ensemble (strict) runs LIVE alongside v5_fresh (relaxed); dedup keeps
# per-window exposure to 1 stake.
# 2026-04-19: Flipped LIVE → GHOST alongside v6_sniper rollout.
# v5_* net-negative on 72h audit; revisit after v6 shadow completes + isotonic recalibration.
# 2026-04-19 (later): Flipped GHOST → LIVE per Billy. Live lineup now
# v5_ensemble + v6_sniper. Previous audit contaminated by broken-classifier
# period (pre-PR #278); re-running fresh on post-fix data.
mode: LIVE
asset: BTC
timescale: 5m

# All logic is in the hook (mirrors v4_fusion). The hook inherits all 13
# v4_fusion gates verbatim and adds two ensemble-specific gates
# (ensemble_fallback_sanity + ensemble_disagreement) after the confidence gate.
gates: []

hooks_file: v5_ensemble.py
pre_gate_hook: evaluate_polymarket_ensemble

# Per-strategy gate tuning. These values match the historical env-var
# defaults (V4_* + V5_*) so this block is a zero-behaviour-change audit
# trail of what v5_ensemble actually runs in production. Env vars fall
# through when a key is omitted (ops escape hatch for 30 days post PR #267).
gate_params:
  # Inherited from v4_fusion — keep aligned with v4_fusion.yaml.
  min_offset_sec: 45
  skip_calm: true
  skip_stale_sources: true
  require_tiingo_agree: true
  health_gate: degraded
  # 2026-04-17: DISABLED by Billy after losing money (commit b094278).
  # Matches current Montreal .env. Re-enable only after shadow data
  # validates that override-skips would have been winners.
  risk_off_override_enabled: false
  risk_off_override_dist_min: 0.20
  risk_off_override_require_tiingo: true

  # v5-specific — ensemble control.
  # Which p_up to consume: ensemble (blended) | lgb_only | path1_only.
  ensemble_signal_source: ensemble

  # Skip when timesfm reports ensemble_config.mode=fallback_lgb_only.
  # Keeps v5_ensemble strictly stricter than v4_fusion when classifier
  # head is unavailable (silent fallback would erase the v5 edge).
  ensemble_skip_on_fallback: true

  # Disagreement abstain threshold on |p_lgb - p_path1|. 0 = gate off.
  # Leave off until we have 200+ trades of shadow calibration baseline.
  ensemble_disagreement_threshold: 0.0

  # 2026-04-19: Hour-of-day gate removed per Billy. Trade all hours
  # initially; chop-regime filter + confidence floor should carry the
  # load without time-based side effects.
  # block_utc_hours: []  (empty = no block)

  # 2026-04-19: Raise confidence floor 0.12 → 0.18 (strict). Only fires
  # on near-STRONG conviction (p_up >= 0.68 or <= 0.32). Subagent 7d
  # audit: dist >= 0.18 + exclude chop = +$2.45/trade (best per-trade $).
  confidence_min_distance: 0.18

  # 2026-04-19: Drop chop regime. 7d audit: chop = 45.5% WR across all
  # conviction buckets (noise). calm_trend = 57.3%, volatile_trend = 62.8%.
  # Default was [calm_trend, volatile_trend]; keep as-is but explicit here.
  tradeable_v4_regimes: [calm_trend, volatile_trend]

  # 2026-04-19: Freshness gate. Skip when surface is older than N seconds.
  # Matches data_surface.py 60s v4-cache rejection; tighten via this knob.
  max_surface_age_seconds: 30.0

# Sizing matches v4_fusion so allocation isn't a confound when comparing WR.
sizing:
  type: fixed_kelly
  fraction: 0.025
  max_collateral_pct: 0.10
