# logrotate config for the Montreal trading engine
#
# Install with:
#   sudo cp scripts/logrotate-novakash-engine.conf /etc/logrotate.d/novakash-engine
#   sudo chown root:root /etc/logrotate.d/novakash-engine
#   sudo chmod 644 /etc/logrotate.d/novakash-engine
#   sudo logrotate -d /etc/logrotate.d/novakash-engine   # dry-run test
#   sudo logrotate /etc/logrotate.d/novakash-engine      # force-run once to verify
#
# By default logrotate runs daily via /etc/cron.daily/logrotate on Ubuntu,
# so installing this file is enough — no crontab work needed.
#
# Safety notes:
# - `copytruncate` is used so we don't have to restart the running engine
#   (the nohup'd process still holds an open fd to the original inode).
#   logrotate copies the file to the rotated name, then truncates the
#   original in-place, which the running engine continues writing to.
# - `compress` uses gzip so old logs shrink ~10x on disk
# - `delaycompress` keeps yesterday's rotation uncompressed for fast grep

/home/novakash/engine.log {
    daily
    rotate 30
    copytruncate
    compress
    delaycompress
    notifempty
    missingok
    maxsize 500M
    su novakash novakash
    dateext
    dateformat -%Y%m%d-%H%M%S
    olddir /home/novakash/log_archive
    createolddir 0755 novakash novakash
}
