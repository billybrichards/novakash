server {
    listen 80;
    server_name _;

    # Static dist served from /var/www/frontend — deploy-frontend.yml
    # extracts the built Vite dist tarball here (`tar xzf ... -C /var/www/frontend`).
    # The earlier default of /usr/share/nginx/html matched only the
    # Docker-container packaging, not the bare-metal EC2 deploy.
    root /var/www/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy to hub — dedicated Hub box (infra split 2026-04-14).
    # Current: 16.54.141.121:8091 (dedicated t3.medium, Elastic IP).
    # Previous: 3.98.114.0:8091 (decommissioned, shared with TimesFM).
    #
    # Use a literal host:port in proxy_pass (no variable). An earlier
    # version used `set $hub_upstream ...; proxy_pass http://$hub_upstream/...`
    # which forced nginx into resolver mode. With the `resolver 8.8.8.8`
    # directive active, nginx tried to DNS-resolve the literal IP and
    # returned 404 for all /api/* paths. Without a variable, the address
    # is parsed at config load and no resolver is used.

    location /api/ {
        proxy_pass http://16.54.141.121:8091/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /auth/ {
        proxy_pass http://16.54.141.121:8091/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://16.54.141.121:8091/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
