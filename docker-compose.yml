version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: btc_trader
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # SECURITY: Postgres is internal-only. Other containers reach it via the
    # compose network at host "db:5432". Do NOT expose 5432 to the host/public
    # interface. For local DB inspection, use:
    #   docker compose exec db psql -U ${DB_USER} btc_trader
    # or bind to loopback only:  ports: ["127.0.0.1:5432:5432"]

  engine:
    build: ./engine
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/btc_trader

  hub:
    build: ./hub
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/btc_trader
      MARGIN_ENGINE_URL: ${MARGIN_ENGINE_URL:-http://localhost:8090}
      TIMESFM_URL: ${TIMESFM_URL:-http://localhost:8001}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  macro-observer:
    build: ./macro-observer
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/btc_trader
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POLL_INTERVAL: "60"
      ANTHROPIC_TIMEOUT: "10"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - hub
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
