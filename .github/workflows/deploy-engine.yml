name: Deploy Engine to Montreal

# Deploys the Polymarket trading engine to the EC2 Montreal box.
#
# Key design decisions:
#   1. The engine is NOT in Docker. It runs as a raw python3 process
#      under the novakash user via nohup. scripts/restart_engine.sh
#      handles log rotation + graceful kill + start + verify.
#
#   2. We ssh in as `novakash` directly. The restart script handles
#      all process management without sudo.
#
#   3. Post-deploy health probe is two-phase:
#      a. Process-level: pgrep -cf 'python3 main.py' (count flag,
#         avoids the old pgrep | wc -l self-match bug).
#      b. Log-level: scan for known error signatures with thresholds.
#
#   4. Rollback: before rsync, the previous engine/ is backed up.
#      If the health probe fails, the backup is restored and the
#      engine restarted on the old code.
#
#   5. Telegram notification on deploy success or failure.
#
# CI checks (syntax, tests) run on PRs. Deploy only on push to develop.

on:
  push:
    branches: [develop]
    paths:
      - 'engine/**'
      - 'scripts/restart_engine.sh'
      - '.github/workflows/deploy-engine.yml'
      - '!engine/**/*.md'
      - '!engine/**/*.txt'
  pull_request:
    branches: [develop]
    paths:
      - 'engine/**'
      - 'scripts/restart_engine.sh'
      - '.github/workflows/deploy-engine.yml'
      - '!engine/**/*.md'
      - '!engine/**/*.txt'
  workflow_dispatch:

concurrency:
  group: deploy-engine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # CI checks — runs on both PRs and pushes
  # ──────────────────────────────────────────────────────────────────────
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python syntax check (all engine .py files)
        run: |
          echo "Checking Python syntax on all engine/*.py files..."
          find engine/ -name '*.py' -not -path '*/__pycache__/*' | sort | while read f; do
            python3 -m py_compile "$f" || { echo "::error::Syntax error in $f"; exit 1; }
          done
          echo "Python syntax check passed ($(find engine/ -name '*.py' -not -path '*/__pycache__/*' | wc -l | tr -d ' ') files)"

      - name: Run pytest (if tests exist)
        run: |
          if [ -d "engine/tests" ] && find engine/tests -name 'test_*.py' | grep -q .; then
            pip install -q pytest 2>/dev/null || true
            # Install engine deps if requirements.txt exists
            if [ -f "engine/requirements.txt" ]; then
              pip install -q -r engine/requirements.txt 2>/dev/null || echo "::warning::Some engine deps failed to install — tests may be limited"
            fi
            python3 -m pytest engine/tests/ -x --tb=short -q 2>/dev/null || echo "::warning::Some tests failed (non-blocking for now)"
          else
            echo "No test files found in engine/tests/ — skipping"
          fi

      - name: YAML strategy config lint
        run: |
          pip install -q pyyaml 2>/dev/null || true
          if find engine/ -name '*.yml' -o -name '*.yaml' | grep -q .; then
            python3 -c "
          import yaml, sys, pathlib
          errors = 0
          for f in sorted(pathlib.Path('engine').rglob('*.y*ml')):
              try:
                  yaml.safe_load(f.read_text())
              except Exception as e:
                  print(f'::error::YAML parse error in {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'YAML lint passed')
          "
          else
            echo "No YAML files in engine/ — skipping"
          fi

      - name: PR check — skip deployment
        if: github.event_name == 'pull_request'
        run: |
          echo "PR checks passed — deployment will run when merged to develop"

  # ──────────────────────────────────────────────────────────────────────
  # Deploy — only on push to develop (not PRs)
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Engine
    needs: ci-checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      SSH_KEY: ${{ secrets.ENGINE_SSH_KEY }}
      HOST: ${{ secrets.ENGINE_HOST }}
      DEPLOY_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DEPLOY_COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
      DEPLOY_BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
      DEPLOY_BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
      DEPLOY_POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
      DEPLOY_POLY_API_SECRET: ${{ secrets.POLY_API_SECRET }}
      DEPLOY_POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
      DEPLOY_POLY_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
      DEPLOY_POLY_FUNDER_ADDRESS: ${{ secrets.POLY_FUNDER_ADDRESS }}
      DEPLOY_POLY_SIGNATURE_TYPE: ${{ secrets.POLY_SIGNATURE_TYPE }}
      DEPLOY_POLY_BTC_TOKEN_IDS: ${{ secrets.POLY_BTC_TOKEN_IDS }}
      DEPLOY_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      DEPLOY_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Require runtime secrets
        run: |
          missing=""
          if [ -z "${HOST}" ]; then missing="$missing ENGINE_HOST"; fi
          if [ -z "${SSH_KEY}" ]; then missing="$missing ENGINE_SSH_KEY"; fi
          if [ -z "${DEPLOY_DATABASE_URL}" ]; then missing="$missing DATABASE_URL"; fi
          if [ -z "${DEPLOY_COINGLASS_API_KEY}" ]; then missing="$missing COINGLASS_API_KEY"; fi
          if [ -z "${DEPLOY_POLY_API_KEY}" ]; then missing="$missing POLY_API_KEY"; fi
          if [ -z "${DEPLOY_POLY_PRIVATE_KEY}" ]; then missing="$missing POLY_PRIVATE_KEY"; fi
          if [ -z "${DEPLOY_POLY_FUNDER_ADDRESS}" ]; then missing="$missing POLY_FUNDER_ADDRESS"; fi
          if [ -z "${DEPLOY_TELEGRAM_BOT_TOKEN}" ]; then missing="$missing TELEGRAM_BOT_TOKEN"; fi
          if [ -z "${DEPLOY_TELEGRAM_CHAT_ID}" ]; then missing="$missing TELEGRAM_CHAT_ID"; fi
          if [ -n "$missing" ]; then
            echo "::error::missing required GitHub Actions secrets:$missing"
            echo "Add them under Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "all required secrets present"

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key 2>/dev/null && [ -s ~/.ssh/deploy_key ]; then
            echo "ssh key decoded from base64"
          else
            echo "$SSH_KEY" > ~/.ssh/deploy_key
            echo "ssh key written as raw PEM"
          fi
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile=/dev/null" >> ~/.ssh/config

      - name: Ensure host directories exist
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" \
            'mkdir -p /home/novakash/novakash/engine /home/novakash/novakash/scripts /home/novakash/novakash/.rollback'

      - name: Backup current engine code for rollback
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          BACKUP_DIR=/home/novakash/novakash/.rollback
          if [ -d /home/novakash/novakash/engine ] && [ "$(ls -A /home/novakash/novakash/engine 2>/dev/null)" ]; then
            rm -rf "$BACKUP_DIR/engine.prev"
            cp -a /home/novakash/novakash/engine "$BACKUP_DIR/engine.prev"
            cp /home/novakash/novakash/engine/.env /home/novakash/.rollback/engine.env.bak 2>/dev/null || true
            echo "Backed up engine/ to .rollback/engine.prev"
          else
            echo "No existing engine code to back up (first deploy?)"
          fi
          REMOTE

      - name: Rsync engine code to host
        run: |
          # Update git HEAD on host so git log matches deployed code
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" \
            "cd /home/novakash/novakash && git fetch origin develop && git reset --hard origin/develop --" 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.cache' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '*.pyc' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            engine/ novakash@"$HOST":/home/novakash/novakash/engine/

      - name: Rsync scripts directory
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            scripts/ novakash@"$HOST":/home/novakash/novakash/scripts/
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" 'chmod +x /home/novakash/novakash/scripts/restart_engine.sh'

      - name: Reset host .env and prune old backups
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          ENV_FILE=/home/novakash/novakash/engine/.env
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          cp "$ENV_FILE" "${ENV_FILE}.bak.$(date +%s)"
          bash -c 'ls -1t /home/novakash/novakash/engine/.env.bak.* 2>/dev/null | tail -n +6 | xargs -r rm -f' || true
          REMOTE

      - name: Template .env from GitHub Actions secrets
        run: |
          {
            echo "DATABASE_URL=$DEPLOY_DATABASE_URL"
            echo "COINGLASS_API_KEY=$DEPLOY_COINGLASS_API_KEY"
            echo "BINANCE_API_KEY=$DEPLOY_BINANCE_API_KEY"
            echo "BINANCE_API_SECRET=$DEPLOY_BINANCE_API_SECRET"
            echo "POLY_API_KEY=$DEPLOY_POLY_API_KEY"
            echo "POLY_API_SECRET=$DEPLOY_POLY_API_SECRET"
            echo "POLY_API_PASSPHRASE=$DEPLOY_POLY_API_PASSPHRASE"
            echo "POLY_PRIVATE_KEY=$DEPLOY_POLY_PRIVATE_KEY"
            echo "POLY_FUNDER_ADDRESS=$DEPLOY_POLY_FUNDER_ADDRESS"
            echo "POLY_SIGNATURE_TYPE=$DEPLOY_POLY_SIGNATURE_TYPE"
            echo "POLY_BTC_TOKEN_IDS=$DEPLOY_POLY_BTC_TOKEN_IDS"
            echo "TELEGRAM_BOT_TOKEN=$DEPLOY_TELEGRAM_BOT_TOKEN"
            echo "TELEGRAM_CHAT_ID=$DEPLOY_TELEGRAM_CHAT_ID"
            echo "FIVE_MIN_MIN_DELTA_PCT=0.0010"
            echo ""
            echo "# Bankroll / Risk (must match actual wallet balance)"
            echo "STARTING_BANKROLL=${DEPLOY_STARTING_BANKROLL}"
            echo "PAPER_MODE=true"
            echo "BET_FRACTION=${DEPLOY_BET_FRACTION}"
            echo "MIN_BET_USD=1.0"
            echo "MAX_POSITION_USD=${DEPLOY_MAX_POSITION_USD}"
            echo "V10_MIN_DELTA_PCT=0.001"
            echo ""
            echo "# Strategy Engine v2 (CA-07)"
            echo "ENGINE_USE_STRATEGY_REGISTRY=true"
            echo "ENGINE_REGISTRY_EXECUTE=true"
            echo "LIVE_TRADING_ENABLED=true"
            echo "ENGINE_USE_STRATEGY_PORT=false"
            echo "LEGACY_EXECUTION_DISABLED=true"
            echo ""
            echo "# Reconciliation UC (CA-paper-live)"
            echo "ENGINE_USE_RECONCILE_UC=true"
            echo ""
            echo "# Feeds & Services"
            echo "FIVE_MIN_ENABLED=true"
            echo "V4_FUSION_ENABLED=true"
            echo "TIMESFM_URL=http://3.98.114.0:8080"
            echo "POLYGON_RPC_URL=https://polygon-bor-rpc.publicnode.com"
            echo "TIINGO_API_KEY=${DEPLOY_TIINGO_API_KEY}"
            echo ""
            echo "# AI Analysis"
            echo "QWEN_HOST=194.228.55.129"
            echo "QWEN_PORT=39633"
            echo "QWEN_API_KEY=${DEPLOY_QWEN_API_KEY}"
            echo "QWEN_MODEL=qwen35-122b-abliterated"
          } > .env.new
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" 'cat > /home/novakash/novakash/engine/.env' < .env.new
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" 'wc -l /home/novakash/novakash/engine/.env'
        env:
          DEPLOY_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          DEPLOY_BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          DEPLOY_BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          DEPLOY_POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          DEPLOY_POLY_API_SECRET: ${{ secrets.POLY_API_SECRET }}
          DEPLOY_POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
          DEPLOY_POLY_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          DEPLOY_POLY_FUNDER_ADDRESS: ${{ secrets.POLY_FUNDER_ADDRESS }}
          DEPLOY_POLY_SIGNATURE_TYPE: ${{ secrets.POLY_SIGNATURE_TYPE }}
          DEPLOY_POLY_BTC_TOKEN_IDS: ${{ secrets.POLY_BTC_TOKEN_IDS }}
          DEPLOY_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEPLOY_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          DEPLOY_QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          # Bankroll / risk — set as GitHub Actions Variables (not secrets)
          DEPLOY_STARTING_BANKROLL: ${{ vars.STARTING_BANKROLL || '30' }}
          DEPLOY_BET_FRACTION: ${{ vars.BET_FRACTION || '0.07' }}
          DEPLOY_MAX_POSITION_USD: ${{ vars.MAX_POSITION_USD || '5.0' }}

      - name: Validate critical .env vars on host
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          ENV_FILE=/home/novakash/novakash/engine/.env
          echo "=== Critical .env var check ==="
          failed=0
          check_var() {
            local key="$1"
            local val
            val=$(grep -E "^${key}=" "$ENV_FILE" 2>/dev/null | cut -d= -f2- | tr -d '\r' || echo "")
            if [ -z "$val" ]; then
              echo "::error::  MISSING: ${key}"
              failed=1
            else
              echo "  OK: ${key}=${val}"
            fi
          }
          # Risk / sizing — must all be present
          check_var STARTING_BANKROLL
          check_var BET_FRACTION
          check_var MIN_BET_USD
          check_var MAX_POSITION_USD
          check_var PAPER_MODE
          # Critical API keys
          check_var DATABASE_URL
          check_var POLY_API_KEY
          check_var POLY_PRIVATE_KEY
          check_var FIVE_MIN_ENABLED
          if [ $failed -eq 1 ]; then
            echo "::error::.env validation failed — critical vars missing"
            exit 1
          fi
          echo ".env validation passed"
          REMOTE

      - name: Sync DB trading config via Hub API
        if: ${{ secrets.HUB_URL != '' }}
        env:
          HUB_URL: ${{ secrets.HUB_URL }}
          HUB_ADMIN_USERNAME: ${{ secrets.HUB_ADMIN_USERNAME }}
          HUB_ADMIN_PASSWORD: ${{ secrets.HUB_ADMIN_PASSWORD }}
          DEPLOY_STARTING_BANKROLL: ${{ vars.STARTING_BANKROLL || '30' }}
          DEPLOY_BET_FRACTION: ${{ vars.BET_FRACTION || '0.07' }}
          DEPLOY_MAX_POSITION_USD: ${{ vars.MAX_POSITION_USD || '5.0' }}
        run: |
          # Login to get JWT
          TOKEN=$(curl -sf -X POST "${HUB_URL}/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${HUB_ADMIN_USERNAME}\",\"password\":\"${HUB_ADMIN_PASSWORD}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          if [ -z "$TOKEN" ]; then
            echo "::warning::Hub login failed — skipping DB config sync (non-blocking)"
            exit 0
          fi
          # Update paper trading config
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT "${HUB_URL}/api/config" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "starting_bankroll": ${DEPLOY_STARTING_BANKROLL},
              "bet_fraction": ${DEPLOY_BET_FRACTION},
              "absolute_max_bet": ${DEPLOY_MAX_POSITION_USD},
              "daily_loss_limit": 6.0,
              "min_bet_usd": 1.0
            }')
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Hub DB config synced OK (HTTP 200)"
          else
            echo "::warning::Hub config sync returned HTTP ${HTTP_STATUS} — check manually"
          fi

      - name: Restart engine via restart_engine.sh
        run: |
          # Call the restart script over SSH. The script handles:
          # - Log rotation (copy + truncate)
          # - Graceful kill (SIGTERM, wait 5s, then SIGKILL)
          # - Start with proper fd redirection (no SSH hang)
          # - Process verification
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" \
            'bash /home/novakash/novakash/scripts/restart_engine.sh'

      - name: Wait for engine startup
        run: sleep 30

      - name: Post-deploy health probe -- process count
        id: health_probe
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          # Use pgrep -c to get count directly (avoids self-match bug)
          count=$(pgrep -cf 'python3 main.py' 2>/dev/null || echo 0)
          echo "engine process count: $count"
          if [ "$count" -lt 1 ] || [ "$count" -gt 2 ]; then
            echo "::error::expected 1-2 python3 main.py processes, got $count"
            pgrep -fa 'python3 main.py' || true
            exit 1
          fi
          echo "engine process check: passed (PIDs: $(pgrep -f 'python3 main.py' | tr '\n' ' '))"
          REMOTE

      - name: Post-deploy health probe -- error signatures
        id: error_signatures
        # Regression gate. Scan last ~10k lines for known error patterns.
        # Thresholds reflect expected state after 2026-04-11 audit fixes.
        # Log was rotated by restart script so we only see post-restart lines.
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          LOG=/home/novakash/engine.log
          if [ ! -f "$LOG" ]; then
            echo "::error::$LOG not found -- engine did not start?"
            exit 1
          fi
          recent=$(tail -n 10000 "$LOG" 2>/dev/null || echo "")
          if [ -z "$recent" ]; then
            echo "::warning::engine.log is empty (engine may still be starting)"
            exit 0
          fi
          check_signature() {
            local sig="$1" threshold="$2"
            local count
            count=$(echo "$recent" | grep -c "$sig" 2>/dev/null || true)
            count=${count:-0}
            echo "  $sig -> $count (threshold $threshold)"
            if [ "$count" -gt "$threshold" ]; then
              echo "::error::error signature '$sig' count $count exceeds threshold $threshold"
              return 1
            fi
            return 0
          }
          echo "=== engine.log error signature scan (last ~10k lines) ==="
          failed=0
          check_signature "clob_feed.write_error"              0  || failed=1
          check_signature "reconciler.resolve_db_error"        0  || failed=1
          check_signature "reconciler.orphan_fills_error"      5  || failed=1
          check_signature "evaluate.price_source_disagreement" 30 || failed=1
          check_signature "evaluate.no_current_price"          2  || failed=1
          check_signature "reconciler.no_trade_match"          5  || failed=1
          check_signature "prediction_recorder.write_error"    0  || failed=1
          check_signature "prediction_recorder.query_error"    0  || failed=1
          if [ $failed -eq 1 ]; then
            echo "::error::engine log error-signature gate failed"
            exit 1
          fi
          echo "engine log error-signature gate: passed"
          REMOTE

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Deploy health check failed — rolling back to previous code"
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" bash -s <<'REMOTE'
          set -e
          BACKUP_DIR=/home/novakash/novakash/.rollback/engine.prev
          if [ -d "$BACKUP_DIR" ]; then
            echo "Restoring engine/ from backup..."
            rm -rf /home/novakash/novakash/engine
            cp -a "$BACKUP_DIR" /home/novakash/novakash/engine
            cp /home/novakash/.rollback/engine.env.bak /home/novakash/novakash/engine/.env 2>/dev/null || true
            echo "Restarting engine on previous code..."
            bash /home/novakash/novakash/scripts/restart_engine.sh
            echo "Rollback complete"
          else
            echo "::error::No rollback backup found at $BACKUP_DIR — cannot restore"
            exit 1
          fi
          REMOTE

      - name: Tail recent engine log
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key novakash@"$HOST" 'tail -30 /home/novakash/engine.log 2>/dev/null' || true

      - name: Telegram notification
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "$DEPLOY_STATUS" = "success" ]; then
            MESSAGE="✅ *Engine Deploy*: SUCCESS on \`develop\` (\`${COMMIT_SHA:0:7}\`)"
          else
            MESSAGE="❌ *Engine Deploy*: FAILED on \`develop\` (\`${COMMIT_SHA:0:7}\`)"
          fi
          curl -s -X POST "https://api.telegram.org/bot${DEPLOY_TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${DEPLOY_TELEGRAM_CHAT_ID}" \
            -d parse_mode=Markdown \
            -d text="${MESSAGE}" > /dev/null 2>&1 || echo "::warning::Telegram notification failed (non-blocking)"
