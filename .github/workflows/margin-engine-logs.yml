name: Margin Engine Logs (one-shot diagnostic)

on:
  workflow_dispatch:
    inputs:
      lines:
        description: "Number of journalctl lines to dump"
        required: false
        default: "300"

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and dump margin engine journal
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MARGIN_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.MARGIN_ENGINE_SSH_KEY }}
          script: |
            set -e
            echo "=== systemctl status ==="
            sudo systemctl status margin-engine --no-pager -l | head -20 || true
            echo
            echo "=== /opt/margin-engine/.env (v4 keys only) ==="
            grep -E "^MARGIN_(PAPER_MODE|ENGINE_USE_V4|V4_)" /opt/margin-engine/.env || true
            echo
            echo "=== last ${{ inputs.lines }} journal lines ==="
            sudo journalctl -u margin-engine --no-pager -n ${{ inputs.lines }}
