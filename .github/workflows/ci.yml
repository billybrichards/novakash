name: CI

# PR-time safety net. Minimal but catches:
#   - Missing imports / bad refactors in margin_engine
#   - Broken Hub proxy imports
#   - Frontend build failures
#   - engine/ imports via engine. prefix (dual-load isinstance bug)
#
# Jobs run in parallel on every PR touching develop or main.
# No path filters by design — a frontend-only PR that breaks hub imports
# will still fail fast at PR time rather than on the production box.
#
# SECURITY NOTE: This workflow uses ZERO untrusted inputs.
#   - No ${{ github.event.* }} interpolations anywhere
#   - All env values are hardcoded literals (see margin-engine job)
#   - No run: commands construct shell strings from PR/issue/comment bodies
#   - Standard first-party actions only (actions/checkout, actions/setup-python, actions/setup-node)
#
# Intentionally NOT adding lint / mypy / unit tests here. That is scope creep
# against the current repo minimalism; follow up in its own PR if needed.

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  margin-engine:
    name: Margin engine - import and settings smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: margin_engine/requirements.txt

      - name: Install dependencies
        run: pip install -r margin_engine/requirements.txt

      - name: Import smoke test
        run: |
          python -c "import margin_engine.main"
          python -c "import margin_engine.adapters.exchange.paper"
          python -c "import margin_engine.adapters.exchange.binance_margin"
          python -c "import margin_engine.adapters.exchange.hyperliquid_price_feed"
          python -c "import margin_engine.adapters.signal.probability_http"
          python -c "import margin_engine.adapters.signal.v4_snapshot_http"
          python -c "import margin_engine.adapters.signal.ws_signal"
          python -c "import margin_engine.application.use_cases.open_position"
          python -c "import margin_engine.application.use_cases.manage_positions"

      - name: Settings validator smoke test
        env:
          MARGIN_DATABASE_URL: "postgresql://x:y@localhost/z"
          MARGIN_PAPER_MODE: "true"
          MARGIN_EXCHANGE_VENUE: "hyperliquid"
        run: python scripts/ci/check_settings_ok.py

      - name: Settings validator rejects garbage venues
        env:
          MARGIN_DATABASE_URL: "postgresql://x:y@localhost/z"
          MARGIN_EXCHANGE_VENUE: "not_a_real_venue"
        run: python scripts/ci/check_settings_rejects_garbage.py

  hub:
    name: Hub - import smoke
    runs-on: ubuntu-latest
    # The hub runs with CWD=hub/ in production (systemd WorkingDirectory and
    # Dockerfile WORKDIR) — its imports are written as `from db.database` not
    # `from hub.db.database`. The CI job mirrors that by running python from
    # inside hub/ instead of the repo root.
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: hub/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "import main"
          python -c "import api.margin"

  engine-canonical-imports:
    name: Engine - canonical imports lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any file imports via engine. prefix
        run: |
          set -e
          # Match only actual import statements (lines starting with optional
          # whitespace then from/import) — not comments or string literals.
          offenders=$(grep -rn "^\s*from engine\.\|^\s*import engine\." engine/ --include="*.py" || true)
          if [ -n "$offenders" ]; then
            echo "::error::Found imports via 'engine.' prefix. Use bare imports (from domain.X, not from engine.domain.X)."
            echo "$offenders"
            exit 1
          fi
          echo "Canonical imports OK."

  engine-tests-fast:
    name: Engine - fast tests + execution coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            engine/requirements.txt
            engine/requirements-test.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt -r engine/requirements-test.txt

      - name: Fast tests + execution-path coverage gate
        working-directory: engine
        run: |
          pytest tests/unit/use_cases tests/use_cases tests/test_pg_execution_guard.py \
            -m "not slow and not integration" \
            -n auto \
            --maxfail=5 \
            --cov=use_cases.reconcile_positions \
            --cov=use_cases.execute_trade \
            --cov=use_cases.execute_manual_trade \
            --cov=use_cases.publish_heartbeat \
            --cov=use_cases.build_window_summary \
            --cov=adapters.persistence.pg_execution_guard \
            --cov-fail-under=90 \
            --cov-report=term-missing

  frontend:
    name: Frontend - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Build
        run: npm --prefix frontend run build
