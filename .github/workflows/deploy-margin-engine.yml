name: Deploy Margin Engine to AWS

on:
  push:
    branches: [develop]
    paths:
      - 'margin_engine/**'
      - '.github/workflows/deploy-margin-engine.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Margin Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to AWS eu-west-2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MARGIN_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.MARGIN_ENGINE_SSH_KEY }}
          script: |
            set -e

            # Create app directory if first deploy
            sudo mkdir -p /opt/margin-engine
            sudo chown ubuntu:ubuntu /opt/margin-engine

            # Stop existing service (if running)
            sudo systemctl stop margin-engine 2>/dev/null || true

            # Clean and copy new code
            rm -rf /opt/margin-engine/app
            mkdir -p /opt/margin-engine/app

      - name: Copy margin engine code
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MARGIN_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.MARGIN_ENGINE_SSH_KEY }}
          source: "margin_engine/"
          target: "/opt/margin-engine/app/"

      - name: Template v4 env vars (idempotent)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MARGIN_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.MARGIN_ENGINE_SSH_KEY }}
          script: |
            set -e
            ENV_FILE=/opt/margin-engine/.env

            # Ensure file exists with safe perms
            sudo touch "$ENV_FILE"
            sudo chown ubuntu:ubuntu "$ENV_FILE"
            sudo chmod 600 "$ENV_FILE"

            # Backup before mutation
            cp "$ENV_FILE" "${ENV_FILE}.bak.$(date +%s)"

            # Idempotent set: replace existing line if present, else append
            set_env() {
              local key="$1" val="$2"
              if grep -qE "^${key}=" "$ENV_FILE"; then
                # Use a delimiter unlikely in URLs (|) and escape val
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            # v4 wiring against Montreal timesfm service
            set_env MARGIN_PAPER_MODE true
            # DQ-06: explicitly pin the paper venue to hyperliquid. The
            # paper+binance branch in main.py constructs PaperExchangeAdapter
            # without a price_getter and prices every fill against a frozen
            # $80k constant. Hyperliquid wiring correctly plumbs
            # HyperliquidPriceFeed as the price source. Without this line,
            # whatever was previously on the host .env sticks (set_env is
            # update-in-place or append, never remove), so a previous deploy
            # that landed in the broken branch could persist across restarts.
            set_env MARGIN_EXCHANGE_VENUE hyperliquid
            set_env MARGIN_ENGINE_USE_V4_ACTIONS true
            set_env MARGIN_V4_SNAPSHOT_URL http://3.98.114.0:8080
            # Phase A.1 hotfix (2026-04-11): reverted to 15m because the
            # 5m Sequoia v5 scorer is writing constant probability_raw=0.6201
            # (stuck at p_up=0.6061) — same bug documented in PR #47 commit
            # message on novakash-timesfm (fd3affc). The scorer's pull-mode
            # _assemble_features() produces v4-shape features; v5 was
            # trained on 25 engine-side features via signal_evaluations, so
            # every inference gets an all-NaN row and LightGBM returns the
            # missing-default constant. PR #47 added a push-mode
            # score_from_features() method + POST /v2/probability endpoint,
            # but the background 1Hz _v2_scoring_loop_for_asset in
            # app/main.py still uses pull-mode, and margin_engine's
            # probability_http.py still uses the GET endpoint — so both
            # writer AND reader paths go through the broken pull-mode.
            # The 15m/nogit model is v4-shape so pull-mode works for it.
            # Will flip back to 5m after Phase B.0 wires push-mode into
            # margin_engine (porting engine/signals/v2_feature_body.py
            # from novakash PR #13 into margin_engine/adapters/signal).
            # See docs/MACRO_AUDIT_2026-04-11.md for the full audit.
            set_env MARGIN_V4_PRIMARY_TIMESCALE 5m
            set_env MARGIN_V4_TIMESCALES 5m,15m,1h,4h
            set_env MARGIN_V4_STRATEGY fee_aware_15m
            set_env MARGIN_V4_POLL_INTERVAL_S 2.0
            set_env MARGIN_V4_FRESHNESS_S 10.0

            # V4 Strategies (2026-04-12): Enable multi-timescale alignment
            # and fee-aware continuation for paper trading on Hyperliquid
            set_env MARGIN_ALIGNMENT_ENABLED true
            set_env MARGIN_ALIGNMENT_MIN_TIMESCALES 3
            set_env MARGIN_FEE_AWARE_CONTINUATION_ENABLED true
            set_env MARGIN_CONTINUATION_ALIGNMENT_ENABLED true
            set_env MARGIN_CONTINUATION_MIN_TIMESCALES 2
            set_env MARGIN_CONTINUATION_HOLD_EXTENSION_MAX 2.0
            set_env MARGIN_MAX_PARTIAL_CLOSES 3
            set_env MARGIN_PARTIAL_CLOSE_COOLDOWN_S 300.0
            set_env MARGIN_FEE_AWARE_PARTIAL_TP_THRESHOLD 0.75
            set_env MARGIN_FEE_AWARE_PARTIAL_TP_SIZE 0.25

            # Phase A (2026-04-11): macro gate demoted from hard veto to
            # advisory by default. 24h audit showed Qwen BEAR calls at
            # 20-30% directional hit rate — actively anti-predictive.
            # Advisory mode: conflict reduces size (0.75x haircut at
            # confidence >= 80) but does NOT skip the entry. Flip back
            # to "veto" to restore hard-gate behaviour.
            set_env MARGIN_V4_MACRO_MODE advisory
            set_env MARGIN_V4_MACRO_HARD_VETO_CONFIDENCE_FLOOR 80
            set_env MARGIN_V4_MACRO_ADVISORY_SIZE_MULT_ON_CONFLICT 0.75

            # Phase A (2026-04-11): experimental NO_EDGE entry override
            # intentionally LEFT UNSET so it stays at its None default.
            # Ships the code ready for activation; the 74-sample 100%
            # hit rate bucket needs a 7-day replay before promotion.
            # See docs/MACRO_AUDIT_2026-04-11.md monitoring section.
            # To enable: uncomment and redeploy
            # set_env MARGIN_V4_ALLOW_NO_EDGE_IF_EXP_MOVE_BPS_GTE 3.0

            echo "v4 env keys after templating:"
            grep -E "^MARGIN_(PAPER_MODE|EXCHANGE_VENUE|ENGINE_USE_V4|V4_)" "$ENV_FILE" || true

            # Cleanup old backups (keep last 5)
            ls -1t "${ENV_FILE}".bak.* 2>/dev/null | tail -n +6 | xargs -r rm -f

      - name: Install and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MARGIN_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.MARGIN_ENGINE_SSH_KEY }}
          script: |
            set -e
            cd /opt/margin-engine/app/margin_engine

            # Create/update venv
            python3 -m venv /opt/margin-engine/venv 2>/dev/null || true
            /opt/margin-engine/venv/bin/pip install --quiet -r requirements.txt

            # Create systemd service if not exists
            if [ ! -f /etc/systemd/system/margin-engine.service ]; then
              sudo tee /etc/systemd/system/margin-engine.service > /dev/null <<'SERVICE'
            [Unit]
            Description=Novakash Margin Engine
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/opt/margin-engine/app
            ExecStart=/opt/margin-engine/venv/bin/python -m margin_engine.main
            EnvironmentFile=/opt/margin-engine/.env
            Restart=on-failure
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable margin-engine
            fi

            # Ensure keys directory exists
            sudo mkdir -p /opt/margin-engine/.keys
            sudo chown ubuntu:ubuntu /opt/margin-engine/.keys
            sudo chmod 700 /opt/margin-engine/.keys

            # Restart service to pick up new env vars (start is no-op if running)
            sudo systemctl restart margin-engine

            # Health check (wait 5s then check if still running)
            sleep 5
            if systemctl is-active --quiet margin-engine; then
              echo "Margin engine is running"
              sudo journalctl -u margin-engine --no-pager -n 30
            else
              echo "Margin engine failed to start"
              sudo journalctl -u margin-engine --no-pager -n 30
              exit 1
            fi
