name: Deploy Frontend to AWS

on:
  push:
    branches: [develop]
    paths:
      - 'frontend/**'
  workflow_dispatch:  # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package dist
        run: tar czf /tmp/frontend-dist.tar.gz -C frontend/dist .

      - name: Deploy to AWS
        env:
          SSH_KEY: ${{ secrets.AWS_FRONTEND_SSH_KEY }}
          HOST: ${{ secrets.AWS_FRONTEND_HOST }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload dist + nginx config
          scp -i ~/.ssh/deploy_key /tmp/frontend-dist.tar.gz "ubuntu@${HOST}:/tmp/frontend-dist.tar.gz"
          scp -i ~/.ssh/deploy_key frontend/nginx.conf "ubuntu@${HOST}:/tmp/nginx-frontend.conf"
          ssh -i ~/.ssh/deploy_key "ubuntu@${HOST}" bash -s <<'FEEOF'
          set -euo pipefail

          sudo rm -rf /var/www/frontend/*
          sudo tar xzf /tmp/frontend-dist.tar.gz -C /var/www/frontend
          sudo chown -R www-data:www-data /var/www/frontend

          # Wipe rogue nginx configs that can shadow /api/* proxy rules.
          # Previous symptom: /api/v58/*, /api/audit-tasks, /api/notes
          # returned 404 via FE proxy while direct hub returned 401 —
          # because a stale conf.d/ file or extra sites-enabled/ entry
          # was routing those paths to an old hub. One file in
          # sites-enabled/ (default), none in conf.d/, is the invariant.
          sudo rm -f /etc/nginx/sites-enabled/*
          sudo rm -f /etc/nginx/conf.d/*.conf
          sudo cp /tmp/nginx-frontend.conf /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl reload nginx

          echo "=== sites-enabled contents ==="
          sudo ls -la /etc/nginx/sites-enabled/
          echo "=== conf.d contents ==="
          sudo ls -la /etc/nginx/conf.d/
          echo "=== active upstream (hub_upstream) ==="
          sudo nginx -T 2>/dev/null | grep -E "hub_upstream|proxy_pass|server_name" | head -10

          rm /tmp/frontend-dist.tar.gz /tmp/nginx-frontend.conf
          FEEOF

          echo "Deployed to http://${HOST}"
