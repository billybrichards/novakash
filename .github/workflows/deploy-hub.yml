name: Deploy Hub to AWS

on:
  push:
    branches: [develop]
    paths:
      - 'hub/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package hub
        run: tar czf /tmp/hub-dist.tar.gz -C hub .

      - name: Deploy to AWS
        env:
          SSH_KEY: ${{ secrets.AWS_FRONTEND_SSH_KEY }}
          HOST: ${{ secrets.AWS_FRONTEND_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key /tmp/hub-dist.tar.gz "ubuntu@${HOST}:/tmp/hub-dist.tar.gz"
          ssh -i ~/.ssh/deploy_key "ubuntu@${HOST}" 'rm -rf /opt/hub/app/* && tar xzf /tmp/hub-dist.tar.gz -C /opt/hub/app && sudo systemctl restart hub && sleep 3 && curl -s http://localhost:8000/health && rm /tmp/hub-dist.tar.gz'
